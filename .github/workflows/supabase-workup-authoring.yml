name: Supabase Workup Authoring Deploy

on:
  workflow_dispatch:
    inputs:
      reviewer_email:
        description: "Optional reviewer email to grant after OAuth sign-in"
        required: false
        type: string
      oauth_provider:
        description: "Supabase OAuth provider to enable"
        required: false
        default: "google"
        type: choice
        options:
          - google
          - github

jobs:
  deploy:
    name: Push Supabase config, schema, seed, and grants
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || 'https://hajjuzpnlvpetsleuxwb.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_-rugOaCgl3r9abyuX7TICA_JQ0KQLhn' }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF || 'hajjuzpnlvpetsleuxwb' }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      WORKUP_STUDIO_OAUTH_PROVIDER: ${{ inputs.oauth_provider }}
      SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID }}
      SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET }}
      SUPABASE_AUTH_EXTERNAL_GITHUB_CLIENT_ID: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GITHUB_CLIENT_ID }}
      SUPABASE_AUTH_EXTERNAL_GITHUB_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GITHUB_SECRET }}
      WORKUP_STUDIO_REVIEWER_EMAIL: ${{ inputs.reviewer_email }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy Workup Studio authoring backend
        run: npm run deploy:supabase-workup-authoring
