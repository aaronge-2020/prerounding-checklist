name: Supabase Workup Authoring Deploy

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/supabase-workup-authoring.yml"
      - "supabase/**"
      - "medical-knowledge/**"
      - "medical-knowledge-db.js"
      - "clinical-intents.js"
      - "workup-authoring.js"
      - "scripts/deploy-supabase-workup-authoring.js"
      - "scripts/import-medical-knowledge.js"
      - "scripts/export-medical-knowledge.js"
      - "scripts/grant-workup-access.js"
      - "scripts/check-supabase-auth-readiness.js"
      - "utils/supabase/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:
    inputs:
      reviewer_email:
        description: "Optional reviewer email to grant after the Auth user exists"
        required: false
        type: string
      auth_method:
        description: "Supabase sign-in method for Workup Studio"
        required: false
        default: "magic-link"
        type: choice
        options:
          - magic-link
          - oauth
      oauth_provider:
        description: "Optional OAuth provider to enable when auth_method is oauth"
        required: false
        default: "google"
        type: choice
        options:
          - google
          - github

concurrency:
  group: supabase-workup-authoring-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Push Supabase config, schema, seed, and grants
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || 'https://hajjuzpnlvpetsleuxwb.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_-rugOaCgl3r9abyuX7TICA_JQ0KQLhn' }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF || 'hajjuzpnlvpetsleuxwb' }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      WORKUP_STUDIO_AUTH_METHOD: ${{ inputs.auth_method || 'magic-link' }}
      WORKUP_STUDIO_OAUTH_PROVIDER: ${{ inputs.oauth_provider || 'google' }}
      SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID }}
      SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET }}
      SUPABASE_AUTH_EXTERNAL_GITHUB_CLIENT_ID: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GITHUB_CLIENT_ID }}
      SUPABASE_AUTH_EXTERNAL_GITHUB_SECRET: ${{ secrets.SUPABASE_AUTH_EXTERNAL_GITHUB_SECRET }}
      WORKUP_STUDIO_REVIEWER_EMAIL: ${{ inputs.reviewer_email || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Check deployment secrets
        shell: bash
        run: |
          missing=()
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then missing+=("SUPABASE_ACCESS_TOKEN"); fi
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then missing+=("SUPABASE_SERVICE_ROLE_KEY"); fi
          if [ -z "${SUPABASE_DB_PASSWORD}" ] && [ -z "${SUPABASE_DB_URL}" ]; then missing+=("SUPABASE_DB_PASSWORD or SUPABASE_DB_URL"); fi
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Supabase Workup Studio deploy is missing required GitHub secret(s):\n' >&2
            printf -- '- %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Deploy Workup Studio authoring backend
        run: npm run deploy:supabase-workup-authoring
