name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-pages.yml"
      - "index.html"
      - "styles.css"
      - "favicon.ico"
      - ".gitattributes"
      - "assets/**"
      - "data/**"
      - "models/**"
      - "prompts/**"
      - "src/**"
      - "vendor/**"
      - "workups/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build static artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          mkdir -p _site/models
          touch _site/.nojekyll
          cp index.html styles.css favicon.ico service-worker.js _site/
          cp -R assets data prompts src vendor workups _site/
          cp -R models/onnx-community models/rtrigoso _site/models/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
