project_id = "prerounding-checklist"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
enabled = true
site_url = "https://aaronge-2020.github.io/prerounding-checklist/"
additional_redirect_urls = [
  "https://aaronge-2020.github.io/prerounding-checklist/?workupStudioOAuth=1",
  "https://aaronge-2020.github.io/prerounding-checklist/index.html?workupStudioOAuth=1",
  "http://localhost:3000/**",
  "http://127.0.0.1:3000/**"
]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"
redirect_uri = ""
url = ""
skip_nonce_check = false
email_optional = false

[db]
port = 54322
major_version = 15
